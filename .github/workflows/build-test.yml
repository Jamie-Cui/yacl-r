name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Release, Debug]
        include:
          - build_type: Release
            cmake_options: ""
          - build_type: Debug
            cmake_options: ""
          - build_type: Release
            cmake_options: "-DENABLE_KERNEL=On -DENABLE_LINK=On"
            name_suffix: "-kernel"

    name: Linux ${{ matrix.build_type }}${{ matrix.name_suffix }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build gcc g++ \
            libgflags-dev libprotobuf-dev protobuf-compiler \
            libgmp-dev perl

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            ${{ matrix.cmake_options }}

      - name: Build
        run: cmake --build build

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -j$(nproc)

  build-linux-arm:
    runs-on: ubuntu-24.04-arm
    name: Linux ARM64
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build gcc g++ \
            libgflags-dev libprotobuf-dev protobuf-compiler \
            libgmp-dev perl

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -j$(nproc)

  build-macos:
    runs-on: macos-latest
    name: macOS (Apple Silicon)
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake ninja gcc gmp protobuf gflags perl

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -j$(sysctl -n hw.ncpu)

  build-minimal:
    runs-on: ubuntu-latest
    name: Linux Minimal (no tests)
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build gcc g++ libgmp-dev perl

      - name: Configure
        run: cmake -S . -B build -G Ninja -DBUILD_TEST=Off

      - name: Build
        run: cmake --build build